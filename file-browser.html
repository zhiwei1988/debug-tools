<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Browser</title>
<link rel="stylesheet" href="common.css">
<style>
.root-info { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 16px; display: none; }
.breadcrumb { font-size: 13px; margin-bottom: 12px; color: var(--color-text-secondary); }
.breadcrumb a { color: var(--color-primary); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; }

.file-table { width: 100%; border-collapse: collapse; }
.file-table th { text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 600; padding: 6px 8px; border-bottom: 2px solid var(--color-border); }
.file-table td { padding: 7px 8px; border-bottom: 1px solid var(--color-border); font-size: 13px; }
.file-table tr:hover { background: var(--color-bg); }
.file-table .name-cell a { color: var(--color-primary); text-decoration: none; cursor: pointer; }
.file-table .name-cell a:hover { text-decoration: underline; }
.file-table .icon { display: inline-block; width: 20px; text-align: center; margin-right: 4px; }
.file-table .size-cell, .file-table .time-cell { color: var(--color-text-secondary); white-space: nowrap; }
.file-table .action-cell { white-space: nowrap; }
.file-table .action-cell button { margin-left: 4px; }

.upload-progress { margin: 8px 0; font-size: 13px; color: var(--color-text-secondary); display: none; }
.upload-progress .name { font-family: var(--font-mono, monospace); }
.upload-progress .bar { display: inline-block; vertical-align: middle; width: 180px; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; margin: 0 8px; }
.upload-progress .bar > span { display: block; height: 100%; background: var(--color-primary); width: 0; transition: width 120ms linear; }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="index.html">Log Parser</a> / <a href="stack-analyzer.html">Stack Analyzer</a> / File Browser</div>
  <h1>File Browser</h1>

  <div class="card">
    <div class="form-row">
      <label for="serverUrl">Server URL</label>
      <div class="file-row">
        <input type="text" id="serverUrl" style="flex:1" placeholder="http://192.168.1.100:3000">
        <button class="btn" id="connectBtn">Connect</button>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="root-info" id="rootInfo"></div>

  <div class="card" id="content" style="display:none">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="toolbar">
      <label class="btn" for="uploadInput">Upload Files</label>
      <input type="file" id="uploadInput" multiple style="display:none">
      <label class="btn" for="uploadFolderInput">Upload Folder</label>
      <input type="file" id="uploadFolderInput" webkitdirectory directory multiple style="display:none">
      <button class="btn" id="mkdirBtn">New Folder</button>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <span class="name" id="uploadProgressName"></span>
      <span class="bar"><span id="uploadProgressBar"></span></span>
      <span id="uploadProgressText"></span>
    </div>
    <table class="file-table">
      <thead><tr><th>Name</th><th style="width:90px">Size</th><th style="width:150px">Modified</th><th style="width:120px">Action</th></tr></thead>
      <tbody id="fileList"></tbody>
    </table>
  </div>
</div>

<script>
const STORAGE_KEY = 'file-browser-server';
const serverUrlEl = document.getElementById('serverUrl');
const connectBtn = document.getElementById('connectBtn');
const errorMsgEl = document.getElementById('errorMsg');
const rootInfoEl = document.getElementById('rootInfo');
const contentEl = document.getElementById('content');
const breadcrumbEl = document.getElementById('breadcrumb');
const fileListEl = document.getElementById('fileList');
const uploadInput = document.getElementById('uploadInput');
const uploadFolderInput = document.getElementById('uploadFolderInput');
const mkdirBtn = document.getElementById('mkdirBtn');
const uploadProgressEl = document.getElementById('uploadProgress');
const uploadProgressNameEl = document.getElementById('uploadProgressName');
const uploadProgressBarEl = document.getElementById('uploadProgressBar');
const uploadProgressTextEl = document.getElementById('uploadProgressText');

let currentPath = '.';

serverUrlEl.value = localStorage.getItem(STORAGE_KEY) || '';

function serverUrl() {
  return serverUrlEl.value.trim().replace(/\/$/, '');
}

function showError(msg) { errorMsgEl.textContent = msg; errorMsgEl.style.display = 'block'; }
function hideError() { errorMsgEl.style.display = 'none'; }

connectBtn.addEventListener('click', connect);
if (serverUrlEl.value) connect();

async function connect() {
  const url = serverUrl();
  if (!url) { showError('Please enter the server URL first.'); return; }
  hideError();
  try {
    const res = await fetch(`${url}/api/files/root`);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    rootInfoEl.textContent = 'Root: ' + data.root;
    rootInfoEl.style.display = 'block';
    contentEl.style.display = 'block';
    localStorage.setItem(STORAGE_KEY, url);
    currentPath = '.';
    loadDir('.');
  } catch {
    rootInfoEl.style.display = 'none';
    contentEl.style.display = 'none';
    showError('Cannot reach the server. Check the URL and make sure the server is running.');
  }
}

async function loadDir(rel) {
  currentPath = rel;
  hideError();
  try {
    const res = await fetch(`${serverUrl()}/api/files/list?path=${encodeURIComponent(rel)}`);
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Server error'); }
    const data = await res.json();
    renderBreadcrumb(rel);
    renderTable(data.entries, rel);
  } catch (e) {
    showError('Load failed: ' + e.message);
  }
}

function renderBreadcrumb(rel) {
  const parts = rel === '.' ? [] : rel.split('/').filter(Boolean);
  let html = '<a onclick="loadDir(\'.\')">ROOT</a>';
  let acc = '';
  for (const p of parts) {
    acc = acc ? acc + '/' + p : p;
    html += ' / <a onclick="loadDir(\'' + esc(acc) + '\')">' + esc(p) + '</a>';
  }
  breadcrumbEl.innerHTML = html;
}

function renderTable(entries, rel) {
  let html = '';
  if (rel !== '.') {
    const parent = rel.includes('/') ? rel.substring(0, rel.lastIndexOf('/')) : '.';
    html += '<tr><td class="name-cell" colspan="4"><span class="icon">..</span><a onclick="loadDir(\'' + esc(parent) + '\')">..</a></td></tr>';
  }
  for (const e of entries) {
    const entryPath = rel === '.' ? e.name : rel + '/' + e.name;
    const escapedPath = esc(entryPath);
    html += '<tr>';
    if (e.type === 'dir') {
      html += '<td class="name-cell"><span class="icon">&#128193;</span><a onclick="loadDir(\'' + escapedPath + '\')">' + esc(e.name) + '/</a></td>';
      html += '<td class="size-cell">-</td>';
    } else {
      html += '<td class="name-cell"><span class="icon">&#128196;</span>' + esc(e.name) + '</td>';
      html += '<td class="size-cell">' + formatSize(e.size) + '</td>';
    }
    html += '<td class="time-cell">' + formatTime(e.mtime) + '</td>';
    html += '<td class="action-cell">';
    if (e.type === 'file') {
      html += '<button class="btn" onclick="download(\'' + escapedPath + '\')">Download</button>';
    } else if (e.type === 'dir') {
      html += '<button class="btn" onclick="downloadFolder(\'' + escapedPath + '\')">Download</button>';
    }
    html += '<button class="btn btn-danger" onclick="remove(\'' + escapedPath + '\')">Delete</button>';
    html += '</td></tr>';
  }
  if (entries.length === 0 && rel === '.') {
    html += '<tr><td colspan="4" style="color:#aaa;text-align:center;padding:20px">Empty directory</td></tr>';
  }
  fileListEl.innerHTML = html;
}

function download(rel) {
  window.open(`${serverUrl()}/api/files/download?path=${encodeURIComponent(rel)}`, '_blank');
}

function downloadFolder(rel) {
  window.open(`${serverUrl()}/api/files/download-folder?path=${encodeURIComponent(rel)}`, '_blank');
}

const UPLOAD_WS_IDLE_MS = 30 * 1000;
const UPLOAD_BACKPRESSURE = 8 * 1024 * 1024;
let uploadWS = null;
let uploadWSIdleTimer = null;

function wsUrl() {
  const u = serverUrl();
  return u.replace(/^http/i, (m) => m.toLowerCase() === 'https' ? 'wss' : 'ws') + '/ws';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function clearUploadIdleTimer() {
  clearTimeout(uploadWSIdleTimer);
  uploadWSIdleTimer = null;
}

function armUploadIdleClose() {
  clearUploadIdleTimer();
  uploadWSIdleTimer = setTimeout(() => {
    if (uploadWS && uploadWS.readyState === WebSocket.OPEN) uploadWS.close();
  }, UPLOAD_WS_IDLE_MS);
}

function ensureUploadWS() {
  if (uploadWS && uploadWS.readyState === WebSocket.OPEN) {
    clearUploadIdleTimer();
    return Promise.resolve(uploadWS);
  }
  return new Promise((resolve, reject) => {
    let ws;
    try { ws = new WebSocket(wsUrl()); } catch (e) { reject(e); return; }
    ws.binaryType = 'arraybuffer';
    const onOpen = () => { ws.removeEventListener('error', onErr); uploadWS = ws; resolve(ws); };
    const onErr = () => { ws.removeEventListener('open', onOpen); reject(new Error('WebSocket connect failed')); };
    ws.addEventListener('open', onOpen, { once: true });
    ws.addEventListener('error', onErr, { once: true });
    ws.addEventListener('close', () => {
      if (uploadWS === ws) uploadWS = null;
      clearUploadIdleTimer();
    });
  });
}

// Wait for a control message whose type is in `expected`; forward ack frames via onAck.
function waitForMsg(ws, expected, onAck) {
  return new Promise((resolve, reject) => {
    function cleanup() {
      ws.removeEventListener('message', onMsg);
      ws.removeEventListener('close', onClose);
      ws.removeEventListener('error', onErr);
    }
    function onMsg(ev) {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === 'ack') { onAck && onAck(msg); return; }
      if (msg.type === 'error') { cleanup(); reject(new Error(msg.msg || 'server error')); return; }
      if (expected.has(msg.type)) { cleanup(); resolve(msg); }
    }
    function onClose() { cleanup(); reject(new Error('WebSocket closed')); }
    function onErr() { cleanup(); reject(new Error('WebSocket error')); }
    ws.addEventListener('message', onMsg);
    ws.addEventListener('close', onClose);
    ws.addEventListener('error', onErr);
  });
}

function showUploadProgress(name, received, total) {
  uploadProgressEl.style.display = 'block';
  uploadProgressNameEl.textContent = name;
  const pct = total > 0 ? Math.min(100, Math.round(received / total * 100)) : 0;
  uploadProgressBarEl.style.width = pct + '%';
  uploadProgressTextEl.textContent = pct + '%  ' + formatSize(received) + ' / ' + formatSize(total);
}

function clearUploadProgress() {
  uploadProgressEl.style.display = 'none';
  uploadProgressNameEl.textContent = '';
  uploadProgressBarEl.style.width = '0';
  uploadProgressTextEl.textContent = '';
}

async function uploadOneFile(ws, file) {
  const relPath = file.webkitRelativePath || file.name;
  const name = relPath;
  showUploadProgress(name, 0, file.size);

  ws.send(JSON.stringify({ type: 'init', path: currentPath, relPath, size: file.size }));
  await waitForMsg(ws, new Set(['ready']), null);

  let serverErr = null;
  const donePromise = waitForMsg(ws, new Set(['done']), (ack) => {
    showUploadProgress(name, ack.received, file.size);
  });
  donePromise.catch(e => { serverErr = e; });

  const reader = file.stream().getReader();
  try {
    while (true) {
      if (serverErr) throw serverErr;
      const { done, value } = await reader.read();
      if (done) break;
      while (ws.bufferedAmount > UPLOAD_BACKPRESSURE) {
        if (ws.readyState !== WebSocket.OPEN || serverErr) break;
        await sleep(10);
      }
      if (serverErr) throw serverErr;
      if (ws.readyState !== WebSocket.OPEN) throw new Error('WebSocket disconnected');
      ws.send(value);
    }
  } finally {
    try { reader.releaseLock(); } catch {}
  }

  if (serverErr) throw serverErr;
  ws.send(JSON.stringify({ type: 'finish' }));
  await donePromise;
  showUploadProgress(name, file.size, file.size);
}

async function handleUpload(files) {
  if (!files || files.length === 0) return;
  hideError();
  const list = Array.from(files);
  try {
    const ws = await ensureUploadWS();
    for (const file of list) {
      await uploadOneFile(ws, file);
    }
    clearUploadProgress();
    armUploadIdleClose();
    loadDir(currentPath);
  } catch (e) {
    showError('Upload failed: ' + e.message);
    clearUploadProgress();
    if (uploadWS && uploadWS.readyState === WebSocket.OPEN) {
      try { uploadWS.send(JSON.stringify({ type: 'abort' })); } catch {}
      uploadWS.close();
    }
  }
}

uploadInput.addEventListener('change', async () => {
  const files = Array.from(uploadInput.files);
  uploadInput.value = '';
  await handleUpload(files);
});

uploadFolderInput.addEventListener('change', async () => {
  const files = Array.from(uploadFolderInput.files);
  uploadFolderInput.value = '';
  await handleUpload(files);
});

mkdirBtn.addEventListener('click', async () => {
  const name = prompt('Folder name:');
  if (!name) return;
  const newPath = currentPath === '.' ? name : currentPath + '/' + name;
  try {
    const res = await fetch(`${serverUrl()}/api/files/mkdir`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: newPath }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Failed'); }
    loadDir(currentPath);
  } catch (e) {
    showError('Create folder failed: ' + e.message);
  }
});

async function remove(rel) {
  if (!confirm('Delete "' + rel + '"?')) return;
  try {
    const res = await fetch(`${serverUrl()}/api/files/delete`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: rel }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Failed'); }
    loadDir(currentPath);
  } catch (e) {
    showError('Delete failed: ' + e.message);
  }
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  const val = bytes / Math.pow(1024, i);
  return (i === 0 ? val : val.toFixed(1)) + ' ' + units[i];
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
